name: Auto Moonsec Deobfuscator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deobfuscate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Patch Source Code Deobfuscator (Anti-Crash Null Check)
      run: |
        echo "[-] Patching CstToAstVisitor.cs untuk menghindari NullReferenceException..."
        
        # PENTING: Mengubah kode C# agar mengembalikan array kosong/null-safe jika object ekspresi bernilai null
        # Kita tembak langsung file source code deobfuscator-nya sebelum di-compile
        cd src/Syntax/ || cd src/ || cd MoonsecDeobfuscator/src/Syntax/ || true
        
        if [ -f "CstToAstVisitor.cs" ]; then
          # Tambahkan proteksi null check pada fungsi GetExpList dan VisitVar agar mengembalikan objek kosong daripada crash
          sed -i 's/ctx.exp()/ctx.exp() ?? new Expression[0]/g' CstToAstVisitor.cs 2>/dev/null || true
          sed -i 's/ctx.NAME().GetText()/ctx?.NAME()?.GetText() ?? "unknown"/g' CstToAstVisitor.cs 2>/dev/null || true
          echo "[-] Patch sukses diterapkan pada source code."
        else
          # Jika folder terbalik, cari manual dan force replace
          find . -name "CstToAstVisitor.cs" -exec sed -i 's/ctx.exp()/ctx.exp() ?? new Expression[0]/g' {} \;
          find . -name "CstToAstVisitor.cs" -exec sed -i 's/ctx.NAME().GetText()/ctx?.NAME()?.GetText() ?? "unknown"/g' {} \;
          echo "[-] Patch paksa via find selesai."
        fi
        cd $GITHUB_WORKSPACE

    - name: Kembalikan w.txt ke bentuk murni awal
      run: |
        # Bersihkan total file w.txt tanpa bungkusan apapun, biarkan murni dari return(function(t,...)
        sed -i "s/.*return(function/return(function/" w.txt

    - name: Restore Dependencies
      run: dotnet restore MoonsecDeobfuscator.csproj

    - name: Jalankan Deobfuscator (Mode Force Bypass)
      run: |
        dotnet run --project MoonsecDeobfuscator.csproj -c Release --property:WarningLevel=0 -- -dev -i w.txt -o hasil_bongkar.luac

    - name: Upload Hasil Bongkar
      uses: actions/upload-artifact@v4
      with:
        name: Hasil-Bongkar-Moonsec
        path: hasil_bongkar.luac
