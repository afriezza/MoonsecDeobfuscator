name: Auto Moonsec Deobfuscator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deobfuscate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Pre-Processing Sakti (Wrapper Fungsi MoonSec V3)
      run: |
        python -c "
        with open('w.txt', 'r', encoding='utf-8', errors='ignore') as f:
            content = f.read()
        
        # Potong junk code awal biar bersih
        start_idx = content.find('return(function')
        if start_idx != -1:
            clean_content = content[start_idx:]
            
            # BUNGKUS KE DALAM FUNGSI LOKAL AGAR PARSER ANTLR4 TIDAK CRASH
            # Ini memindahkan ekspresi return rumit ke dalam container aman
            wrapped_content = 'local function _afriezzx_wrapper()\n' + clean_content + '\nend\n_afriezzx_wrapper()'
            
            with open('w.txt', 'w', encoding='utf-8') as f:
                f.write(wrapped_content)
            print('[-] BERHASIL: Script MoonSec V3 berhasil dibungkus aman.')
        else:
            print('[-] GAGAL: return(function tidak ditemukan!')
        "
        echo "=== TAMPILAN 150 KARAKTER PERTAMA W.TXT BARU ==="
        head -c 150 w.txt
        echo -e "\n==============================================="

    - name: Restore Dependencies
      run: dotnet restore MoonsecDeobfuscator.csproj

    - name: Jalankan Deobfuscator
      run: |
        dotnet run --project MoonsecDeobfuscator.csproj -c Release --property:WarningLevel=0 -- -dev -i w.txt -o hasil_bongkar.luac

    - name: Upload Hasil Bongkar
      uses: actions/upload-artifact@v4
      with:
        name: Hasil-Bongkar-Moonsec
        path: hasil_bongkar.luac
