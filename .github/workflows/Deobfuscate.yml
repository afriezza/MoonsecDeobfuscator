name: Auto Moonsec Deobfuscator

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deobfuscate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Normalisasi Format MoonSec V3 (Python Fix)
      run: |
        python -c "
        with open('w.txt', 'r', encoding='utf-8', errors='ignore') as f:
            content = f.read()
        
        # 1. Bersihkan junk code tulisan protected di paling awal
        start_idx = content.find('return(function')
        if start_idx != -1:
            clean_content = content[start_idx:]
            
            # 2. Ubah kata kunci 'return(function' menjadi assignment variabel biasa 'moonsec_run = (function'
            # Ini trik paling ampuh agar ANTLR parser menganggapnya sebagai deklarasi statement biasa, bukan return menggantung
            fixed_content = clean_content.replace('return(function', 'moonsec_run = (function', 1)
            
            with open('w.txt', 'w', encoding='utf-8') as f:
                f.write(fixed_content)
            print('[-] BERHASIL: Format w.txt dinormalisasi menjadi assignment statement.')
        else:
            print('[-] GAGAL: Pola return tidak ditemukan!')
        "
        echo "=== LIHAT HASIL CONVERT 150 KARAKTER PERTAMA ==="
        head -c 150 w.txt
        echo -e "\n================================================"

    - name: Restore Dependencies
      run: dotnet restore MoonsecDeobfuscator.csproj

    - name: Jalankan Deobfuscator
      run: |
        dotnet run --project MoonsecDeobfuscator.csproj -c Release -- -dev -i w.txt -o hasil_bongkar.luac

    - name: Upload Hasil Bongkar
      uses: actions/upload-artifact@v4
      with:
        name: Hasil-Bongkar-Moonsec
        path: hasil_bongkar.luac
