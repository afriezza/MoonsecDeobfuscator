name: Auto Moonsec Deobfuscator

on:
  workflow_dispatch: # Biar bisa lu klik tombol RUN manual kapan aja

jobs:
  deobfuscate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Download w.txt from URL or Create Raw
      run: |
        # Tips: Lu bisa upload w.txt lu ke pastebin/discord, terus ganti URL di bawah ini
        # Atau lu bisa langsung commit file w.txt lu ke dalam repo ini sebelum di-run.
        # Baris di bawah ini asumsi lu udah upload file w.txt ke root repo lu:
        echo "Menyiapkan file w.txt..."

    - name: Build Tool
      run: dotnet build -c Release

    - name: Run Deobfuscator
      run: |
        dotnet run --project MoonsecDeobfuscator/MoonsecDeobfuscator.csproj -- -dev -i w.txt -o hasil_bongkar.luac
        dotnet run --project MoonsecDeobfuscator/MoonsecDeobfuscator.csproj -- -dis -i w.txt -o hasil_disassembly.txt

    - name: Upload Hasil Bongkar ke Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hasil-moonsec-luac
        path: |
          hasil_bongkar.luac
          hasil_disassembly.txt
          
