name: Auto Moonsec Deobfuscator

on:
  workflow_dispatch: # Biar bisa lu klik tombol RUN manual kapan aja

jobs:
  deobfuscate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Build Tool
      # Kita langsung build file .csproj yang ada di folder root hasil fork lu
      run: dotnet build -c Release

    - name: Run Deobfuscator
      # Di sini jalurnya gua benerin murni ke file .csproj yang pas
      run: |
        dotnet run --project MoonsecDeobfuscator.csproj -- -dev -i w.txt -o hasil_bongkar.luac
        dotnet run --project MoonsecDeobfuscator.csproj -- -dis -i w.txt -o hasil_disassembly.txt

    - name: Upload Hasil Bongkar ke Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hasil-moonsec-luac
        path: |
          hasil_bongkar.luac
          hasil_disassembly.txt
